<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Enrollment Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Student Course Enrollment Form</h2>

        ```
        <form action="/action.php" method="post">

            <label for="username">Student Name:</label>
            <input type="text" id="username" name="username"><br>

            <label for="password">Portal Password:</label>
            <input type="password" name="password" placeholder="Enter Password"><br>

            <input type="checkbox" name="subscribe" value="yes">
            I agree to the Terms and Conditions<br>

            <label>Gender:</label>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female<br><br>

            <label>Select Course:</label>
            <select name="course">
                <option value="web">Web Development</option>
                <option value="ds">Data Science</option>
                <option value="cyber">Cyber Security</option>
                <option value="cloud">Cloud Computing</option>
            </select><br><br>

            <label>Why do you want to enroll?</label><br>
            <textarea name="comments" rows="4" cols="30"></textarea><br>

            <label>Upload Resume:</label>
            <input type="file" name="resume"><br>

            <label>Age:</label>
            <input type="number" name="age" min="18" max="100"><br>

            <label>Interest Level:</label>
            <input type="range" name="volume" min="0" max="100"><br>

            <label>Date of Birth:</label>
            <input type="date" name="dob"><br>

            <label>Email:</label>
            <input type="email" name="email"><br>

            <label>LinkedIn/Profile URL:</label>
            <input type="url" name="website"><br>

            <label>Search Course:</label>
            <input type="search" name="query"><br>

            <button type="submit">Enroll Now</button>

        </form>
        ```

    </div>

</body>

</html>
