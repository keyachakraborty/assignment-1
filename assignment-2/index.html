<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Grid Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <div class="item1" style="grid-area: box-1;">
        <img src="images/img1.jpg" alt="Rosmalai">
    </div>

    <div class="item2" style="grid-area: box-2;">
        <img src="images/img2.jpg" alt="Phuchka">
    </div>

    <div class="item3" style="grid-area: box-3;">
        <img src="images/img3.jpg" alt="Biriyani">
    </div>

    <div class="item4" style="grid-area: box-4;">
        <img src="images/img4.jpg" alt="Momo">
    </div>

    <div class="item5" style="grid-area: box-5;">
        <img src="images/img5.jpg" alt="Pizza">
    </div>

    <div class="item6" style="grid-area: box-6;">
        <img src="images/img6.jpg" alt="Pasta">
    </div>

</div>

</body>
</html>
